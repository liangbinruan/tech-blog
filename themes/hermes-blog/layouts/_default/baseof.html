<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }} - {{ .Site.Title }}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.6; max-width: 800px; margin: 0 auto; padding: 20px; }
        header { border-bottom: 2px solid #eee; padding-bottom: 20px; margin-bottom: 30px; }
        header h1 { font-size: 2.5em; color: #333; }
        header nav { margin-top: 15px; }
        header nav a { margin-right: 20px; text-decoration: none; color: #0066cc; }
        header nav a:hover { text-decoration: underline; }
        main { min-height: 60vh; }
        .post-item { margin-bottom: 30px; }
        .post-item h2 { font-size: 1.8em; margin-bottom: 10px; }
        .post-item h2 a { color: #333; text-decoration: none; }
        .post-item h2 a:hover { color: #0066cc; }
        footer { border-top: 2px solid #eee; padding-top: 20px; margin-top: 50px; color: #666; font-size: 0.9em; }
    </style>
</head>
<body>
    <header>
        <h1>{{ .Site.Title }}</h1>
        <nav>
            {{ range .Site.Menus.main }}
            <a href="{{ .URL }}">{{ .Name }}</a>
            {{ end }}
        </nav>
    </header>
    <main>
        {{ block "main" . }}{{ end }}
    </main>
    <footer>
        <p>&copy; {{ now.Year }} {{ .Site.Title }}. Powered by Hugo.</p>
    </footer>
</body>
</html>
