{{ define "main" }}
<div class="container">
    <div class="section-header">
        <h2>{{ .Title }}</h2>
        <p>{{ .Content }}</p>
    </div>
    
    <div class="card-grid">
        {{ range .Pages }}
        <div class="card">
            <div class="card-body">
                <div class="card-meta">
                    <span class="category">{{ .Section | humanize }}</span>
                    <span>{{ .Date.Format "2006-01-02" }}</span>
                </div>
                <h3><a href="{{ .RelPermalink }}">{{ .Title }}</a></h3>
                <p>{{ .Summary | truncate 180 }}</p>
                {{ if .Params.tags }}
                <div class="card-tags">
                    {{ range .Params.tags }}
                    <span class="tag">{{ . }}</span>
                    {{ end }}
                </div>
                {{ end }}
            </div>
        </div>
        {{ end }}
    </div>
</div>
{{ end }}
