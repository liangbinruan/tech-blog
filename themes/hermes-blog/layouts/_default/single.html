{{ define "main" }}
<div class="post-container">
    <h1 class="post-title">{{ .Title }}</h1>
    <div class="post-meta">
        <span class="category">{{ .Section | humanize }}</span>
        <span>{{ .Date.Format "2006-01-02" }}</span>
        {{ if .Params.tags }}
        <span>
            {{ range .Params.tags }}
            <span class="tag">{{ . }}</span>
            {{ end }}
        </span>
        {{ end }}
    </div>
    <div class="post-content">
        {{ .Content }}
    </div>
</div>
{{ end }}
